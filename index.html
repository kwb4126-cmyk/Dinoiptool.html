<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 조회 도구</title>
    <style>
        :root {
            --bg: #121212;
            --fg: #e0e0e0;
            --accent: #4caf50;
            --btn-bg: #1e1e1e;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 5px 0 15px 0;
            font-size: 18px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="text"] {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            border-radius: 4px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .grid-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }

        button:hover {
            background-color: #2c2c2c;
            border-color: #555;
        }

        .counter {
            font-size: 14px;
            color: #aaa;
        }

        textarea {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            width: 100%;
            height: 250px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 4px;
            outline: none;
        }

        .cmd-box {
            display: flex;
            gap: 6px;
        }

        .cmd-box label {
            line-height: 38px;
            font-weight: bold;
            font-size: 13px;
            color: #aaa;
        }

        .cmd-box button {
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IP 조회 및 정보 확인</h2>

    <input type="text" id="ipInput" placeholder="IP 주소 입력">

    <div class="grid-btns">
        <button onclick="ipLookup()">조회</button>
        <button onclick="autoDetect()">내 IP</button>
        <button onclick="pasteClip()">붙여넣기</button>
        <button onclick="showStats()">통계</button>
        <button onclick="showLog()">로그</button>
        <button onclick="clearLog()">초기화</button>
    </div>

    <div class="counter" id="counterLabel">조회 횟수: 0</div>

    <textarea id="logText" readonly>준비 완료</textarea>

    <div class="cmd-box">
        <label>명령어</label>
        <input type="text" id="cmdInput" placeholder="명령어 입력 (!stats, !clear 등)">
        <button onclick="runCmd()">실행</button>
    </div>
</div>

<script>
    let count = 0;
    let stats = {};
    let lastIp = null;

    const txt = document.getElementById('logText');
    const e = document.getElementById('ipInput');
    const cmdE = document.getElementById('cmdInput');
    const c = document.getElementById('counterLabel');

    function log(text) {
        txt.value += text;
        txt.scrollTop = txt.scrollHeight;
    }

    async function pasteClip() {
        try {
            const text = await navigator.clipboard.readText();
            e.value = text;
        } catch (err) {
            alert("클립보드 권한이 거부되었거나 지원하지 않는 브라우저입니다.");
        }
    }

    async function ipLookup() {
        const ip = e.value.trim();
        if (!ip) {
            alert("IP 주소를 입력하세요.");
            return;
        }
        try {
            lastIp = ip;
            let res = await fetch(`http://ip-api.com/json/${ip}`);
            let d = await res.json();
            
            if (d.status === "fail") {
                alert("유효하지 않은 IP 주소입니다.");
                return;
            }
            
            let status = (d.proxy || d.hosting) ? "VPN / 호스팅 의심" : "정상 네트워크";
            let timeStr = new Date().toLocaleTimeString();
            
            let resultStr = `[${timeStr}] IP: ${ip}\n상태: ${status}\n국가/도시: ${d.country} ${d.city}\nISP: ${d.isp}\n\n`;
            
            stats[d.country] = (stats[d.country] || 0) + 1;
            count++;
            c.innerText = `조회 횟수: ${count}`;
            
            log(resultStr);
        } catch (ex) {
            alert("조회 중 오류가 발생했습니다: " + ex);
        }
    }

    async function autoDetect() {
        try {
            let res = await fetch("https://api.ipify.org?format=json");
            let d = await res.json();
            e.value = d.ip;
            ipLookup();
        } catch {
            alert("공인 IP를 가져오지 못했습니다.");
        }
    }

    function showStats() {
        let statsStr = Object.entries(stats).map(([k, v]) => `${k}: ${v회}`).join("\n");
        alert(statsStr || "조회된 데이터가 없습니다.");
    }

    async function showLog() {
        if (!lastIp) {
            log("조회된 IP 데이터가 없습니다.\n");
            return;
        }
        try {
            let res = await fetch(`http://ip-api.com/json/${lastIp}`);
            let d = await res.json();
            log(`[로그 상세] ${lastIp}\n위치: ${d.country} ${d.city}\n좌표: ${d.lat}, ${d.lon}\n지도: https://maps.google.com/?q=${d.lat},${d.lon}\n\n`);
        } catch {
            log("로그를 불러오지 못했습니다.\n");
        }
    }

    function clearLog() {
        txt.value = "";
    }

    async function runCmd() {
        let cVal = cmdE.value.trim();
        cmdE.value = "";

        if (cVal === "!stats") {
            showStats();
        } else if (cVal === "!clear") {
            clearLog();
        } else if (cVal === "!ip") {
            autoDetect();
        } else {
            log(`알 수 없는 명령어: ${cVal}\n`);
        }
    }

    cmdE.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            runCmd();
        }
    });
</script>

</body>
</html>
