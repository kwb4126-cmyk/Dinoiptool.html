<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위치 확인 도구</title>
    <style>
        :root {
            --bg: #121212;
            --fg: #e0e0e0;
            --accent: #4caf50;
            --btn-bg: #1e1e1e;
            --btn-hover: #2c2c2c;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grid-btns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 14px 8px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #555;
        }

        button:active {
            transform: scale(0.97);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #aaa;
            padding: 0 4px;
        }

        textarea {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            width: 100%;
            height: 260px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 14px;
            box-sizing: border-box;
            border-radius: 16px;
            outline: none;
            line-height: 1.4;
        }

        .extra-btns {
            display: flex;
            gap: 8px;
        }

        .extra-btns button {
            flex: 1;
            border-radius: 20px;
            background-color: #1a231a;
            border-color: #2e522e;
            color: #81c784;
        }

        .extra-btns button:hover {
            background-color: #233523;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>실제 위치 확인 도구</h2>

    <div class="grid-btns">
        <button onclick="getMyLocation()">내 위치 찾기 (GPS)</button>
        <button onclick="clearLog()">초기화</button>
    </div>

    <div class="status-bar">
        <span id="counterLabel">측정 횟수: 0</span>
        <span id="targetIpLabel" style="color: #666;">정확도: 높음</span>
    </div>

    <textarea id="logText" readonly>버튼을 눌러 현재 위치를 확인하세요.</textarea>

    <div class="extra-btns">
        <button onclick="openMap()">📍 구글 지도 열기</button>
        <button onclick="copyResult()">📋 결과 복사</button>
    </div>
</div>

<script>
    let count = 0;
    let lastLat = null;
    let lastLon = null;

    const txt = document.getElementById('logText');
    const c = document.getElementById('counterLabel');

    function log(text) {
        txt.value += text;
        txt.scrollTop = txt.scrollHeight;
    }

    function getMyLocation() {
        if (!navigator.geolocation) {
            alert("이 브라우저는 위치 정보를 지원하지 않습니다.");
            return;
        }

        log("\n> 위치 정보 요청 중...\n");

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                lastLat = position.coords.latitude;
                lastLon = position.coords.longitude;
                let accuracy = position.coords.accuracy;
                let timeStr = new Date().toLocaleTimeString();

                let resultStr = `[${timeStr}] GPS 위치 측정 성공\n- 위도: ${lastLat}\n- 경도: ${lastLon}\n- 오차 범위: 약 ${Math.round(accuracy)}m\n\n`;
                
                count++;
                c.innerText = `측정 횟수: ${count}`;
                log(resultStr);
            },
            (error) => {
                alert("위치 정보를 가져오지 못했습니다. 위치 권한을 허용했는지 확인해주세요.");
                log(`> 에러: ${error.message}\n`);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    function openMap() {
        if (!lastLat || !lastLon) {
            alert("먼저 내 위치를 확인해주세요.");
            return;
        }
        window.open(`https://maps.google.com/?q=${lastLat},${lastLon}`, '_blank');
    }

    function copyResult() {
        if (!txt.value) {
            alert("복사할 내용이 없습니다.");
            return;
        }
        navigator.clipboard.writeText(txt.value).then(() => {
            alert("결과가 복사되었습니다!");
        });
    }

    function clearLog() {
        txt.value = "";
    }
</script>

</body>
</html>
