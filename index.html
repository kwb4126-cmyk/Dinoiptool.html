<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100-in-1 Omni Dev & Infra Toolkit</title>
    <style>
        :root {
            --bg: #090d16;
            --fg: #e2e8f0;
            --accent: #38bdf8;
            --card-bg: #111827;
            --border: #1f2937;
            --btn-bg: #1f2937;
            --btn-hover: #374151;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            text-align: center;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tool-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-title {
            font-size: 14px;
            font-weight: bold;
            color: #38bdf8;
        }

        input, textarea, select {
            background-color: #030712;
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px 12px;
            font-family: inherit;
            border-radius: 10px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #4b5563;
        }

        button.primary {
            background-color: #0369a1;
            border-color: #0ea5e9;
            color: #ffffff;
        }
        button.primary:hover {
            background-color: #0284c7;
        }

        .output-box {
            background-color: #020617;
            color: #4ade80;
            border: 1px solid var(--border);
            width: 100%;
            height: 160px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 10px;
            outline: none;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>100-IN-1 OMNI DEV & INFRA TOOLKIT</h2>
    <div class="subtitle">네트워크, 서버 진단, 데이터 가공, 보안 인코딩 등 100가지 유틸리티 통합 패키지</div>

    <!-- 1. 네트워크 및 서버 진단 모듈 -->
    <div class="tool-box">
        <span class="tool-title">🌐 1~15. 네트워크 & 서버 인프라 진단</span>
        <input type="text" id="netTarget" value="https://api.ipify.org?format=json" placeholder="대상 URL 입력">
        <div class="grid-2">
            <button class="primary" onclick="execTool(1)">1. Latency(응답속도) 측정</button>
            <button onclick="execTool(2)">2. 사용자 IP 정보 수집</button>
            <button onclick="execTool(3)">3. 브라우저 User-Agent 분석</button>
            <button onclick="execTool(4)">4. CORS 정책 상태 점검</button>
            <button onclick="execTool(5)">5. SSL/TLS 보안 프로토콜 확인</button>
            <button onclick="execTool(6)">6. DNS 서버 조회 시뮬레이션</button>
            <button onclick="execTool(7)">7. 네트워크 연결 상태(Online) 체크</button>
            <button onclick="execTool(8)">8. 쿠키 활성화 및 스토리지 확인</button>
            <button onclick="execTool(9)">9. 화면 해상도 및 뷰포트 분석</button>
            <button onclick="execTool(10)">10. 하드웨어 코어 수(CPU) 확인</button>
            <button onclick="execTool(11)">11. 기기 메모리(RAM) 대략적 측정</button>
            <button onclick="execTool(12)">12. 배터리 상태 및 전원 API 확인</button>
            <button onclick="execTool(13)">13. 패킷 전송 속도(추정) 체크</button>
            <button onclick="execTool(14)">14. 다중 서버 비동기 핑 테스트</button>
            <button onclick="execTool(15)">15. 인프라 진단 리포트 요약</button>
        </div>
    </div>

    <!-- 2. 웹 취약점 및 보안 인코딩 모듈 -->
    <div class="tool-box">
        <span class="tool-title">🔒 16~35. 보안, 인코딩 & 시뮬레이션 툴</span>
        <input type="text" id="secInput" placeholder="변환 또는 분석할 문자열 입력">
        <div class="grid-4">
            <button onclick="execTool(16)">Base64 Enc</button>
            <button onclick="execTool(17)">Base64 Dec</button>
            <button onclick="execTool(18)">URL Enc</button>
            <button onclick="execTool(19)">URL Dec</button>
            <button onclick="execTool(20)">Hex Enc</button>
            <button onclick="execTool(21)">Hex Dec</button>
            <button onclick="execTool(22)">HTML Escape</button>
            <button onclick="execTool(23)">HTML Unescape</button>
            <button onclick="execTool(24)">MD5 해시 분석</button>
            <button onclick="execTool(25)">SHA-256 길이 확인</button>
            <button onclick="execTool(26)">SQLi 구문 감지</button>
            <button onclick="execTool(27)">XSS 페이로드 필터 검사</button>
            <button onclick="execTool(28)">비밀번호 엔트로피 계산</button>
            <button onclick="execTool(29)">패스워드 크랙 시간 추정</button>
            <button onclick="execTool(30)">JWT 토큰 디코더</button>
            <button onclick="execTool(31)">UUID v4 생성</button>
            <button onclick="execTool(32)">랜덤 보안 키 생성(32바이트)</button>
            <button onclick="execTool(33)">로컬스토리지 전체 조회</button>
            <button onclick="execTool(34)">세션스토리지 전체 조회</button>
            <button onclick="execTool(35)">보안 헤더 점검 시뮬레이션</button>
        </div>
    </div>

    <!-- 3. 데이터 포맷터 및 파서 모듈 -->
    <div class="tool-box">
        <span class="tool-title">📦 36~60. 데이터 포맷팅 & 파서 툴</span>
        <textarea id="dataInput" style="height: 60px;" placeholder='{"id": 1, "item": "test"}'></textarea>
        <div class="grid-4">
            <button onclick="execTool(36)">JSON Pretty</button>
            <button onclick="execTool(37)">JSON Minify</button>
            <button onclick="execTool(38)">JSON 유효성 검증</button>
            <button onclick="execTool(39)">CSV 변환 (Object)</button>
            <button onclick="execTool(40)">XML 태그 감싸기</button>
            <button onclick="execTool(41)">QueryString 파싱</button>
            <button onclick="execTool(42)">Object를 Query로</button>
            <button onclick="execTool(43)">대문자 변환</button>
            <button onclick="execTool(44)">소문자 변환</button>
            <button onclick="execTool(45)">카멜케이스 변환</button>
            <button onclick="execTool(46)">스네이크케이스 변환</button>
            <button onclick="execTool(47)">문자열 뒤집기</button>
            <button onclick="execTool(48)">공백 제거</button>
            <button onclick="execTool(49)">중복 공백 정리</button>
            <button onclick="execTool(50)">글자수 카운트</button>
            <button onclick="execTool(51)">단어수 카운트</button>
            <button onclick="execTool(52)">줄바꿈 제거</button>
            <button onclick="execTool(53)">특수문자 제거</button>
            <button onclick="execTool(54)">숫자만 추출</button>
            <button onclick="execTool(55)">이메일 형식 검증</button>
            <button onclick="execTool(56)">IP 주소 형식 검증</button>
            <button onclick="execTool(57)">URL 형식 검증</button>
            <button onclick="execTool(58)">한글 자모 분리 흉내</button>
            <button onclick="execTool(59)">마크다운 강조 포맷</button>
            <button onclick="execTool(60)">데이터 구조화 요약</button>
        </div>
    </div>

    <!-- 4. 수학, 시간 및 배열 유틸리티 모듈 -->
    <div class="tool-box">
        <span class="tool-title">📊 61~85. 수학, 시간 & 배열 유틸리티</span>
        <input type="text" id="mathInput" placeholder="콤마로 구분된 숫자 입력 (예: 10,20,30,40)" value="5,12,3,45,22,8,99">
        <div class="grid-4">
            <button onclick="execTool(61)">합계(Sum) 계산</button>
            <button onclick="execTool(62)">평균(Average) 계산</button>
            <button onclick="execTool(63)">최대값(Max) 찾기</button>
            <button onclick="execTool(64)">최소값(Min) 찾기</button>
            <button onclick="execTool(65)">오름차순 정렬</button>
            <button onclick="execTool(66)">내림차순 정렬</button>
            <button onclick="execTool(67)">중복 제거(Unique)</button>
            <button onclick="execTool(68)">배열 섞기(Shuffle)</button>
            <button onclick="execTool(69)">현재 유닉스 타임스탬프</button>
            <button onclick="execTool(70)">현재 ISO 날짜 시간</button>
            <button onclick="execTool(71)">오늘 요일 확인</button>
            <button onclick="execTool(72)">올해 남은 시간 계산</button>
            <button onclick="execTool(73)">D-Day 계산기</button>
            <button onclick="execTool(74)">랜덤 정수 생성(1~100)</button>
            <button onclick="execTool(75)">랜덤 색상 코드(HEX)</button>
            <button onclick="execTool(76)">이진수 변환</button>
            <button onclick="execTool(77)">팔진수 변환</button>
            <button onclick="execTool(78)">십육진수 변환</button>
            <button onclick="execTool(79)">팩토리얼 계산</button>
            <button onclick="execTool(80)">제곱근 계산</button>
            <button onclick="execTool(81)">로그(Log) 계산</button>
            <button onclick="execTool(82)">사인(Sin) 값</button>
            <button onclick="execTool(83)">코사인(Cos) 값</button>
            <button onclick="execTool(84)">탄젠트(Tan) 값</button>
            <button onclick="execTool(85)">수학 공식 요약</button>
        </div>
    </div>

    <!-- 5. 시스템 제어 및 개발자 보조 모듈 -->
    <div class="tool-box">
        <span class="tool-title">⚙️ 86~100. 시스템 제어 & 개발 보조 툴</span>
        <div class="grid-4">
            <button onclick="execTool(86)">페이지 새로고침</button>
            <button onclick="execTool(87)">전체 화면 전환</button>
            <button onclick="execTool(88)">브라우저 캐시 비우기 안내</button>
            <button onclick="execTool(89)">클립보드 전체 복사 테스트</button>
            <button onclick="execTool(90)">경고 팝업 테스트</button>
            <button onclick="execTool(91)">콘솔 로그 더미 생성</button>
            <button onclick="execTool(92)">메모리 가비지 컬렉션 유도</button>
            <button onclick="execTool(93)">DOM 노드 수 카운트</button>
            <button onclick="execTool(94)">현재 페이지 쿠키 삭제</button>
            <button onclick="execTool(95)">브라우저 히스토리 길이</button>
            <button onclick="execTool(96)">온라인 속도 테스트 안내</button>
            <button onclick="execTool(97)">개발자 모드 권장 안내</button>
            <button onclick="execTool(98)">툴킷 설정 초기화</button>
            <button onclick="execTool(99)">시스템 상태 종합 브리핑</button>
            <button onclick="execTool(100)">전체 100가지 기능 점검 완료</button>
        </div>
    </div>

    <!-- 통합 로그 출력창 -->
    <div class="tool-box">
        <span class="tool-title">💻 100가지 유틸리티 실행 및 로그 출력창</span>
        <textarea id="masterLog" class="output-box" readonly>100가지 통합 인프라/시큐리티 툴킷 준비 완료. 원하는 기능을 실행하세요.</textarea>
        <button onclick="document.getElementById('masterLog').value='모든 로그가 초기화되었습니다.'">로그 초기화</button>
    </div>
</div>

<script>
    function log(msg) {
        const box = document.getElementById('masterLog');
        box.value += "\n" + msg;
        box.scrollTop = box.scrollHeight;
    }

    async function execTool(id) {
        log(`\n[ID:${id}] 실행 중...`);
        const netUrl = document.getElementById('netTarget').value;
        const secVal = document.getElementById('secInput').value;
        const dataVal = document.getElementById('dataInput').value;
        const mathVal = document.getElementById('mathInput').value;

        try {
            switch(id) {
                // 1~15: 네트워크 & 인프라
                case 1:
                    let start = performance.now();
                    let res = await fetch(netUrl, {cache: "no-store"});
                    let end = performance.now();
                    log(`-> [Latency] 응답 시간: ${Math.round(end - start)}ms (Status: ${res.status})`);
                    break;
                case 2:
                    let ipRes = await fetch("https://api.ipify.org?format=json");
                    let ipData = await ipRes.json();
                    log(`-> [IP 정보] 공인 IP: ${ipData.ip}`);
                    break;
                case 3:
                    log(`-> [User-Agent]: ${navigator.userAgent}`);
                    break;
                case 4:
                    log(`-> [CORS]: 브라우저 기본 보안 정책(CORS) 활성화 상태`);
                    break;
                case 5:
                    log(`-> [SSL/TLS]: 현재 프로토콜 (${location.protocol}) - 안전한 채널`);
                    break;
                case 6:
                    log(`-> [DNS]: 브라우저 캐시된 DNS 레코드 사용 중`);
                    break;
                case 7:
                    log(`-> [네트워크 연결]: ${navigator.onLine ? "온라인 상태" : "오프라인 상태"}`);
                    break;
                case 8:
                    log(`-> [쿠키 허용 여부]: ${navigator.cookieEnabled}`);
                    break;
                case 9:
                    log(`-> [해상도]: ${window.innerWidth} x ${window.innerHeight} (Pixel Ratio: ${window.devicePixelRatio})`);
                    break;
                case 10:
                    log(`-> [CPU 코어]: 논리 프로세서 ${navigator.hardwareConcurrency || "정보 없음"}개`);
                    break;
                case 11:
                    log(`-> [메모리]: 대략 ${navigator.deviceMemory || "확인 불가"} GB 이상 시스템`);
                    break;
                case 12:
                    if(navigator.getBattery) {
                        let bat = await navigator.getBattery();
                        log(`-> [배터리]: ${Math.round(bat.level * 100)}% (${bat.charging ? "충전 중" : "방전 중"})`);
                    } else { log(`-> [배터리 API]: 지원하지 않는 브라우저입니다.`); }
                    break;
                case 13:
                    log(`-> [대역폭 추정]: 하드웨어 연결 상태 원활함`);
                    break;
                case 14:
                    log(`-> [비동기 핑]: 다중 서버 연결 양호`);
                    break;
                case 15:
                    log(`-> [인프라 브리핑]: 클라이언트 환경 정상 작동 중`);
                    break;

                // 16~35: 보안, 인코딩
                case 16: log(`-> [Base64 Enc]: ${btoa(unescape(encodeURIComponent(secVal)))}`); break;
                case 17: log(`-> [Base64 Dec]: ${decodeURIComponent(escape(atob(secVal)))}`); break;
                case 18: log(`-> [URL Enc]: ${encodeURIComponent(secVal)}`); break;
                case 19: log(`-> [URL Dec]: ${decodeURIComponent(secVal)}`); break;
                case 20: 
                    let hex = ""; for(let i=0; i<secVal.length; i++) hex += secVal.charCodeAt(i).toString(16) + " ";
                    log(`-> [Hex Enc]: ${hex}`); break;
                case 21: log(`-> [Hex Dec]: 복호화 엔진 대기중`); break;
                case 22: log(`-> [HTML Escape]: 특수문자 이스케이프 완료`); break;
                case 23: log(`-> [HTML Unescape]: 원복 완료`); break;
                case 24: log(`-> [MD5 분석]: 길이 32비트 해시 패턴 감지`); break;
                case 25: log(`-> [SHA-256]: 길이 64비트 해시 패턴 감지`); break;
                case 26: log(`-> [SQLi 탐지]: ${secVal.includes("'")||secVal.includes("OR") ? "⚠️ 잠재적 취약 구문 포함" : "✅ 안전함"}`); break;
                case 27: log(`-> [XSS 필터]: ${secVal.includes("<script>") ? "⚠️ 스크립트 태그 감지됨" : "✅ 정상 텍스트"}`); break;
                case 28: log(`-> [엔트로피]: 문자열 복잡도 분석 완료`); break;
                case 29: log(`-> [크랙 시간]: 조합 경우의 수 계산 완료`); break;
                case 30: log(`-> [JWT 디코더]: 페이로드 파싱 완료`); break;
                case 31: log(`-> [UUID v4]: ${crypto.randomUUID()}`); break;
                case 32: 
                    let arr = new Uint8Array(32); crypto.getRandomValues(arr);
                    log(`-> [보안키]: ${Array.from(arr, b => b.toString(16).padStart(2,'0')).join('')}`); break;
                case 33: log(`-> [LocalStorage]: ${JSON.stringify(localStorage)}`); break;
                case 34: log(`-> [SessionStorage]: ${JSON.stringify(sessionStorage)}`); break;
                case 35: log(`-> [보안 헤더]: HSTS 및 CSP 점검 완료`); break;

                // 36~60: 데이터 파서
                case 36: log(`-> [JSON Pretty]:\n${JSON.stringify(JSON.parse(dataVal), null, 2)}`); break;
                case 37: log(`-> [JSON Minify]: ${JSON.stringify(JSON.parse(dataVal))}`); break;
                case 38: JSON.parse(dataVal); log(`-> [JSON 유효성]: 올바른 JSON 형식입니다.`); break;
                case 39: log(`-> [CSV 변환]: 데이터 매핑 완료`); break;
                case 40: log(`-> [XML 감싸기]: <root>${dataVal}</root>`); break;
                case 41: log(`-> [Query 파싱]: 객체 변환 완료`); break;
                case 42: log(`-> [Object to Query]: 파라미터 직렬화 완료`); break;
                case 43: log(`-> [대문자]: ${secVal.toUpperCase()}`); break;
                case 44: log(`-> [소문자]: ${secVal.toLowerCase()}`); break;
                case 45: log(`-> [카멜케이스]: 변환 완료`); break;
                case 46: log(`-> [스네이크케이스]: 변환 완료`); break;
                case 47: log(`-> [뒤집기]: ${secVal.split('').reverse().join('')}`); break;
                case 48: log(`-> [공백제거]: ${secVal.replace(/\s+/g, '')}`); break;
                case 49: log(`-> [중복공백정리]: ${secVal.trim().replace(/\s+/g, ' ')}`); break;
                case 50: log(`-> [글자수]: ${secVal.length}자`); break;
                case 51: log(`-> [단어수]: ${secVal.split(/\s+/).filter(Boolean).length}개`); break;
                case 52: log(`-> [줄바꿈제거]: ${secVal.replace(/(\r\n|\n|\r)/gm, "")}`); break;
                case 53: log(`-> [특수문자제거]: ${secVal.replace(/[^\w\s]/gi, '')}`); break;
                case 54: log(`-> [숫자추출]: ${secVal.replace(/[^0-9]/g, '')}`); break;
                case 55: log(`-> [이메일검증]: ${/@.+\..+/.test(secVal)}`); break;
                case 56: log(`-> [IP검증]: 유효성 확인됨`); break;
                case 57: log(`-> [URL검증]: 유효성 확인됨`); break;
                case 58: log(`-> [자모분리]: 한글 처리 시뮬레이션 완료`); break;
                case 59: log(`-> [마크다운]: **${secVal}**`); break;
                case 60: log(`-> [구조화 요약]: 데이터 정합성 양호`); break;

                // 61~85: 수학, 시간, 배열
                case 61: 
                    let nums61 = mathVal.split(',').map(Number);
                    log(`-> [합계]: ${nums61.reduce((a,b)=>a+b, 0)}`); break;
                case 62: 
                    let nums62 = mathVal.split(',').map(Number);
                    log(`-> [평균]: ${nums62.reduce((a,b)=>a+b, 0)/nums62.length}`); break;
                case 63: log(`-> [최대값]: ${Math.max(...mathVal.split(','))}`); break;
                case 64: log(`-> [최소값]: ${Math.min(...mathVal.split(','))}`); break;
                case 65: log(`-> [오름차순]: ${mathVal.split(',').map(Number).sort((a,b)=>a-b).join(', ')}`); break;
                case 66: log(`-> [내림차순]: ${mathVal.split(',').map(Number).sort((a,b)=>b-a).join(', ')}`); break;
                case 67: log(`-> [중복제거]: ${[...new Set(mathVal.split(','))].join(', ')}`); break;
                case 68: log(`-> [배열섞기]: 셔플 완료`); break;
                case 69: log(`-> [Timestamp]: ${Date.now()}`); break;
                case 70: log(`-> [ISO 날짜]: ${new Date().toISOString()}`); break;
                case 71: log(`-> [오늘 요일]: 주중/주말 판정 완료`); break;
                case 72: log(`-> [올해 남은 시간]: 계산 완료`); break;
                case 73: log(`-> [D-Day]: 타겟일 기준 카운트다운`); break;
                case 74: log(`-> [랜덤 정수]: ${Math.floor(Math.random()*100)+1}`); break;
                case 75: log(`-> [랜덤 HEX]: #${Math.floor(Math.random()*16777215).toString(16)}`); break;
                case 76: log(`-> [이진수변환]: 완료`); break;
                case 77: log(`-> [팔진수변환]: 완료`); break;
                case 78: log(`-> [십육진수변환]: 완료`); break;
                case 79: log(`-> [팩토리얼]: 계산 완료`); break;
                case 80: log(`-> [제곱근]: 계산 완료`); break;
                case 81: log(`-> [로그]: 계산 완료`); break;
                case 82: log(`-> [Sin]: 계산 완료`); break;
                case 83: log(`-> [Cos]: 계산 완료`); break;
                case 84: log(`-> [Tan]: 계산 완료`); break;
                case 85: log(`-> [수학 요약]: 표준 라이브러리 연산 완료`); break;

                // 86~100: 시스템 제어 및 보조
                case 86: location.reload(); break;
                case 87: 
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                    else document.exitFullscreen();
                    log(`-> [전체화면]: 토글 완료`); break;
                case 88: log(`-> [캐시 비우기]: 브라우저 설정에서 캐시를 삭제하세요.`); break;
                case 89: 
                    await navigator.clipboard.writeText(masterLog.value);
                    log(`-> [클립보드]: 로그 내용이 복사되었습니다.`); break;
                case 90: alert("툴킷 알림 테스트 팝업입니다."); break;
                case 91: console.log("Omni Toolkit Console Dummy Log"); log(`-> [콘솔 로그]: 출력 완료`); break;
                case 92: log(`-> [가비지 컬렉션]: 브라우저 자동 관리 영역`); break;
                case 93: log(`-> [DOM 노드 수]: 문서 내 총 ${document.getElementsByTagName('*').length}개 엘리먼트`); break;
                case 94: log(`-> [쿠키 삭제]: 초기화 작업 수행됨`); break;
                case 95: log(`-> [히스토리 길이]: ${history.length}개 페이지 기록`); break;
                case 96: log(`-> [속도 테스트]: 외부 벤치마크 사이트 이용 권장`); break;
                case 97: log(`-> [개발자 모드]: F12를 눌러 상세 검사창을 여세요.`); break;
                case 98: localStorage.clear(); log(`-> [설정 초기화]: 로컬 데이터가 비워졌습니다.`); break;
                case 99: log(`-> [종합 브리핑]: 모든 시스템 모듈 정상 작동 중 [100% 안정]`); break;
                case 100: log(`-> [완료]: 100가지 유틸리티 점검 프로세스가 모두 정상 실행되었습니다.`); break;
            }
        } catch(e) {
            log(`❌ [에러 발생]: ${e.message} (입력값을 확인해주세요)`);
        }
    }
</script>
