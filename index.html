<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Security & Network Toolkit</title>
    <style>
        :root {
            --bg: #0b0e14;
            --fg: #e2e8f0;
            --accent: #10b981;
            --accent-hover: #059669;
            --btn-bg: #161b22;
            --btn-hover: #21262d;
            --border: #30363d;
            --card-bg: #11161d;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 22px;
            text-align: center;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .tool-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-title {
            font-size: 14px;
            font-weight: bold;
            color: #58a6ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input, textarea, select {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px 14px;
            font-family: inherit;
            border-radius: 12px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #8b949e;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #0d4429;
            border-color: #1b6038;
            color: #3fb950;
        }

        .btn-primary:hover {
            background-color: #115935;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .output-box {
            background-color: #090d12;
            color: var(--accent);
            border: 1px solid var(--border);
            width: 100%;
            height: 130px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 12px;
            outline: none;
            line-height: 1.4;
        }

        .status-badge {
            font-size: 12px;
            color: #8b949e;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PRO SECURITY TOOLKIT</h2>

    <!-- 1. GPS 내 위치 측정 -->
    <div class="tool-box">
        <span class="tool-title">📍 1. 정밀 GPS 위치 확인</span>
        <button class="btn-primary" onclick="getMyLocation()">현재 위치 (위도/경도/지도) 측정</button>
    </div>

    <!-- 2. 공인 IP & 네트워크 정보 -->
    <div class="tool-box">
        <span class="tool-title">🌐 2. 공인 IP & 네트워크 조회</span>
        <button class="btn-primary" onclick="getPublicIP()">내 공인 IP 및 세부 정보 가져오기</button>
    </div>

    <!-- 3. 실무 모의해킹 Payload 복사기 -->
    <div class="tool-box">
        <span class="tool-title">⚡ 3. 웹 취약점 진단 페이로드 치트시트</span>
        <select id="payloadSelect">
            <option value="' OR '1'='1 -- ">SQL Injection (인증 우회 기본형)</option>
            <option value="<script>alert(document.cookie)</script>">XSS (쿠키 탈취 스크립트)</option>
            <option value="../../../../etc/passwd">Path Traversal (시스템 파일 접근)</option>
            <option value="<svg/onload=alert(1)>">XSS (필터 우회 변형 태그)</option>
        </select>
        <button onclick="copyPayload()">선택한 페이로드 즉시 복사</button>
    </div>

    <!-- 4. JWT (JSON Web Token) 디코더 -->
    <div class="tool-box">
        <span class="tool-title">🔓 4. JWT 토큰 분석기 (Payload 파서)</span>
        <input type="text" id="jwtInput" placeholder="eyJhbGciOi... (JWT 토큰 입력)">
        <button onclick="decodeJWT()">토큰 구조(Header/Payload) 해체</button>
    </div>

    <!-- 5. URL / Base64 인코더·디코더 -->
    <div class="tool-box">
        <span class="tool-title">🔄 5. 인코딩 / 디코딩 스위트</span>
        <input type="text" id="encodeInput" placeholder="변환할 문자열 입력">
        <div class="grid-2">
            <button onclick="b64Encode()">Base64 암호화</button>
            <button onclick="b64Decode()">Base64 복호화</button>
        </div>
        <div class="grid-2">
            <button onclick="urlEncode()">URL 인코딩</button>
            <button onclick="urlDecode()">URL 디코딩</button>
        </div>
    </div>

    <!-- 6. 강력한 비밀번호 & 해시 생성 -->
    <div class="tool-box">
        <span class="tool-title">🔑 6. 보안 패스워드 & 길이 계산기</span>
        <button onclick="generateSecurePassword()">고강도 랜덤 비밀번호 생성 (16자리)</button>
    </div>

    <!-- 7. XSS / HTML 엔티티 이스케이프 -->
    <div class="tool-box">
        <span class="tool-title">🛡️ 7. HTML 엔티티 이스케이프 (방어 코드 변환)</span>
        <input type="text" id="htmlEscapeInput" placeholder="<script>alert('hack')</script>">
        <button onclick="escapeHTMLText()">특수문자 안전하게 필터링</button>
    </div>

    <!-- 8. 민감 정보/패턴 실시간 탐지 스캐너 -->
    <div class="tool-box">
        <span class="tool-title">🔍 8. 소스코드 민감 정보 패턴 스캐너</span>
        <textarea id="scanInput" style="height: 60px;" placeholder="검사할 소스코드나 텍스트 입력..."></textarea>
        <button onclick="scanSensitiveData()">취약 패턴(API Key / 비번) 검사</button>
    </div>

    <!-- 9. 데이터 용량 및 브라우저 포문율 계산 -->
    <div class="tool-box">
        <span class="tool-title">📊 9. 패킷 / 데이터 용량 단위 환산</span>
        <input type="text" id="byteInput" placeholder="바이트(Bytes) 입력 (예: 5242880)">
        <button onclick="convertBytes()">KB / MB / GB로 환산</button>
    </div>

    <!-- 10. 통합 분석 로그 출력창 -->
    <div class="tool-box">
        <span class="tool-title">💻 통합 실행 로그 출력</span>
        <textarea id="globalLog" class="output-box" readonly>보안 툴킷 준비 완료.</textarea>
        <div class="grid-2">
            <button onclick="openMap()" style="background-color: #1b2e23; color: #3fb950;">📍 마지막 좌표 구글 지도 열기</button>
            <button onclick="document.getElementById('globalLog').value=''">로그 초기화</button>
        </div>
    </div>
</div>

<script>
    let lastLat = null;
    let lastLon = null;

    function log(msg) {
        const box = document.getElementById('globalLog');
        box.value += "\n" + msg;
        box.scrollTop = box.scrollHeight;
    }

    // 1. GPS
    function getMyLocation() {
        if (!navigator.geolocation) {
            alert("위치 정보를 지원하지 않는 브라우저입니다.");
            return;
        }
        log("\n[GPS] 위치 정보 수집 요청 중...");
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                lastLat = pos.coords.latitude;
                lastLon = pos.coords.longitude;
                log(`[GPS 성공] 위도: ${lastLat}, 경도: ${lastLon} (오차: 약 ${Math.round(pos.coords.accuracy)}m)`);
            },
            (err) => { log(`[GPS 오류] 권한이 거부되었거나 실패했습니다: ${err.message}`); },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function openMap() {
        if (!lastLat || !lastLon) {
            alert("측정된 GPS 좌표가 없습니다. 먼저 위치를 측정해주세요.");
            return;
        }
        window.open(`https://maps.google.com/?q=${lastLat},${lastLon}`, '_blank');
    }

    // 2. 공인 IP 조회
    async function getPublicIP() {
        try {
            log("\n[네트워크] 공인 IP 조회 중...");
            let res = await fetch("https://ipwho.is/");
            let data = await res.json();
            if(data.success) {
                log(`[IP 조회 성공] IP: ${data.ip}\n- 국가/도시: ${data.country} / ${data.city}\n- ISP: ${data.connection?.isp || '정보 없음'}\n- VPN/호스팅 여부: ${(data.connection?.proxy || data.connection?.hosting) ? '⚠️ 우회/호스팅 의심' : '정상 네트워크'}`);
            } else {
                log("[IP 조회 실패]");
            }
        } catch(e) {
            log("[IP 조회 에러]: 네트워크 연결을 확인하세요.");
        }
    }

    // 3. 페이로드 복사
    function copyPayload() {
        let val = document.getElementById('payloadSelect').value;
        navigator.clipboard.writeText(val).then(() => {
            log(`[클립보드]: 페이로드 복사 완료 -> ${val}`);
            alert("페이로드가 클립보드에 복사되었습니다.");
        });
    }

    // 4. JWT 파서
    function decodeJWT() {
        try {
            let token = document.getElementById('jwtInput').value.trim();
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            log(`\n[JWT 파싱 결과]:\n${jsonPayload}`);
        } catch(e) {
            log("[JWT 에러]: 올바른 토큰 형식이 아닙니다.");
        }
    }

    // 5. 인코더/디코더
    function b64Encode() {
        try {
            let v = document.getElementById('encodeInput').value;
            log(`[Base64 Enc]: ${btoa(unescape(encodeURIComponent(v)))}`);
        } catch(e) { log("인코딩 실패"); }
    }
    function b64Decode() {
        try {
            let v = document.getElementById('encodeInput').value;
            log(`[Base64 Dec]: ${decodeURIComponent(escape(atob(v)))}`);
        } catch(e) { log("디코딩 실패 (잘못된 포맷)"); }
    }
    function urlEncode() {
        let v = document.getElementById('encodeInput').value;
        log(`[URL Enc]: ${encodeURIComponent(v)}`);
    }
    function urlDecode() {
        let v = document.getElementById('encodeInput').value;
        log(`[URL Dec]: ${decodeURIComponent(v)}`);
    }

    // 6. 패스워드 생성기
    function generateSecurePassword() {
        const chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+-=";
        let pwd = "";
        for (let i = 0; i < 16; i++) {
            pwd += chars[Math.floor(Math.random() * chars.length)];
        }
        log(`\n[생성된 고강도 비번]: ${pwd}`);
        navigator.clipboard.writeText(pwd);
        alert("16자리 고강도 비밀번호가 생성되고 클립보드에 복사되었습니다!");
    }

    // 7. HTML 이스케이프
    function escapeHTMLText() {
        let str = document.getElementById('htmlEscapeInput').value;
        let escaped = str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        log(`\n[HTML 방어 변환]:\n${escaped}`);
    }

    // 8. 민감 정보 스캐너
    function scanSensitiveData() {
        let text = document.getElementById('scanInput').value;
        let patterns = [
            { name: "AWS Access Key", regex: /AKIA[0-9A-Z]{16}/ },
            { name: "Private Key", regex: /-----BEGIN PRIVATE KEY-----/ },
            { name: "임의의 비밀번호 키워드", regex: /password\s*=\s*['"][^'"]+['"]/i },
            { name: "주민등록번호 패턴", regex: /\d{6}-[1-4]\d{6}/ }
        ];
        
        log("\n[민감 정보 스캔 결과]:");
        let found = false;
        patterns.forEach(p => {
            if (p.regex.test(text)) {
                log(`⚠️ 경고: [${p.name}] 패턴이 감지되었습니다!`);
                found = true;
            }
        });
        if (!found) log("✅ 위험 패턴이 발견되지 않았습니다.");
    }

    // 9. 용량 환산
    function convertBytes() {
        let b = parseInt(document.getElementById('byteInput').value) || 0;
        log(`[용량 환산]: ${b.toLocaleString()} Bytes = ${(b/1024).toFixed(2)} KB = ${(b/(1024*1024)).toFixed(2)} MB = ${(b/(1024*1024*1024)).toFixed(2)} GB`);
    }
</script>

</body>
</html>
