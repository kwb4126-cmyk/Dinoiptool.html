<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP 조회 도구</title>
    <style>
        :root {
            --bg: #121212;
            --fg: #e0e0e0;
            --accent: #4caf50;
            --btn-bg: #1e1e1e;
            --btn-hover: #2c2c2c;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 둥글둥글한 입력창 */
        input[type="text"] {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            font-family: inherit;
            border-radius: 24px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        /* 버튼 그리드 (둥글둥글한 알약 형태) */
        .grid-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px 8px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #555;
        }

        button:active {
            transform: scale(0.97);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #aaa;
            padding: 0 4px;
        }

        /* 둥글둥글한 로그 출력창 */
        textarea {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            width: 100%;
            height: 260px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 14px;
            box-sizing: border-box;
            border-radius: 16px;
            outline: none;
            line-height: 1.4;
        }

        /* 하단 추가 기능 버튼 영역 */
        .extra-btns {
            display: flex;
            gap: 8px;
        }

        .extra-btns button {
            flex: 1;
            border-radius: 20px;
            background-color: #1a231a;
            border-color: #2e522e;
            color: #81c784;
        }

        .extra-btns button:hover {
            background-color: #233523;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IP 조회 및 정보 확인</h2>

    <input type="text" id="ipInput" placeholder="IP 주소 입력">

    <div class="grid-btns">
        <button onclick="ipLookup()">조회</button>
        <button onclick="autoDetect()">내 IP</button>
        <button onclick="pasteClip()">붙여넣기</button>
        <button onclick="showStats()">통계</button>
        <button onclick="showLog()">로그</button>
        <button onclick="clearLog()">초기화</button>
    </div>

    <div class="status-bar">
        <span id="counterLabel">조회 횟수: 0</span>
        <span id="targetIpLabel" style="color: #666;">대상: 없음</span>
    </div>

    <textarea id="logText" readonly>준비 완료</textarea>

    <!-- 추가된 기능 버튼들 (지도 열기, 결과 복사) -->
    <div class="extra-btns">
        <button onclick="openMap()">📍 지도 열기</button>
        <button onclick="copyResult()">📋 결과 복사</button>
    </div>
</div>

<script>
    let count = 0;
    let stats = {};
    let lastIp = null;
    let lastResultText = "";

    const txt = document.getElementById('logText');
    const e = document.getElementById('ipInput');
    const c = document.getElementById('counterLabel');
    const targetLabel = document.getElementById('targetIpLabel');

    function log(text) {
        txt.value += text;
        txt.scrollTop = txt.scrollHeight;
    }

    async function pasteClip() {
        try {
            const text = await navigator.clipboard.readText();
            e.value = text;
        } catch (err) {
            alert("클립보드 권한이 거부되었거나 지원하지 않는 브라우저입니다.");
        }
    }

    async function ipLookup() {
        const ip = e.value.trim();
        if (!ip) {
            alert("IP 주소를 입력하세요.");
            return;
        }
        try {
            lastIp = ip;
            targetLabel.innerText = `대상: ${ip}`;
            
            let res = await fetch(`https://ipwho.is/${ip}`);
            let d = await res.json();
            
            if (!d.success) {
                alert("유효하지 않은 IP 주소입니다.");
                return;
            }
            
            let status = (d.connection && (d.connection.proxy || d.connection.hosting)) ? "VPN / 호스팅 의심" : "정상 네트워크";
            let timeStr = new Date().toLocaleTimeString();
            
            lastResultStr = `[${timeStr}] IP: ${ip}\n상태: ${status}\n국가/도시: ${d.country} ${d.city}\nISP: ${d.connection ? d.connection.isp : '정보 없음'}\n위도/경도: ${d.latitude}, ${d.longitude}\n\n`;
            
            stats[d.country] = (stats[d.country] || 0) + 1;
            count++;
            c.innerText = `조회 횟수: ${count}`;
            
            log(lastResultStr);
        } catch (ex) {
            alert("조회 중 오류가 발생했습니다: " + ex);
        }
    }

    async function autoDetect() {
        try {
            let res = await fetch("https://api.ipify.org?format=json");
            let d = await res.json();
            e.value = d.ip;
            ipLookup();
        } catch {
            alert("공인 IP를 가져오지 못했습니다.");
        }
    }

    function showStats() {
        let statsStr = Object.entries(stats).map(([k, v]) => `${k}: ${v}회`).join("\n");
        alert(statsStr || "조회된 데이터가 없습니다.");
    }

    async function showLog() {
        if (!lastIp) {
            log("조회된 IP 데이터가 없습니다.\n");
            return;
        }
        try {
            let res = await fetch(`https://ipwho.is/${lastIp}`);
            let d = await res.json();
            log(`[로그 상세] ${lastIp}\n위치: ${d.country} ${d.city}\n좌표: ${d.latitude}, ${d.longitude}\n지도: https://maps.google.com/?q=${d.latitude},${d.longitude}\n\n`);
        } catch {
            log("로그를 불러오지 못했습니다.\n");
        }
    }

    // [신규 기능] 구글 지도 바로 열기 버튼
    async function openMap() {
        if (!lastIp) {
            alert("먼저 IP를 조회해주세요.");
            return;
        }
        try {
            let res = await fetch(`https://ipwho.is/${lastIp}`);
            let d = await res.json();
            if (d.latitude && d.longitude) {
                window.open(`https://maps.google.com/?q=${d.latitude},${d.longitude}`, '_blank');
            } else {
                alert("위치 정보를 찾을 수 없습니다.");
            }
        } catch {
            alert("지도 연동 중 오류가 발생했습니다.");
        }
    }

    // [신규 기능] 조회 결과 클립보드 복사 버튼
    function copyResult() {
        if (!txt.value) {
            alert("복사할 내용이 없습니다.");
            return;
        }
        navigator.clipboard.writeText(txt.value).then(() => {
            alert("조회 결과가 클립보드에 복사되었습니다!");
        }).catch(() => {
            alert("복사 실패");
        });
    }

    function clearLog() {
        txt.value = "";
    }
</script>

</body>
</html>
