<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev & Infrastructure Toolkit</title>
    <style>
        :root {
            --bg: #0f1117;
            --fg: #e2e8f0;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --border: #334155;
            --btn-bg: #0f172a;
            --btn-hover: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            text-align: center;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .tool-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-title {
            font-size: 14px;
            font-weight: bold;
            color: #94a3b8;
        }

        input, textarea {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px 14px;
            font-family: inherit;
            border-radius: 12px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #64748b;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-action {
            background-color: #0369a1;
            border-color: #0ea5e9;
            color: #ffffff;
        }

        .btn-action:hover {
            background-color: #0284c7;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .output-box {
            background-color: #020617;
            color: #4ade80;
            border: 1px solid var(--border);
            width: 100%;
            height: 150px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 12px;
            outline: none;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DEV & INFRA TOOLS</h2>

    <!-- 1. API 응답 속도 (Latency) 실시간 측정기 -->
    <div class="tool-box">
        <span class="tool-title">⏱️ 1. 서버/API 응답 속도(Latency) 측정</span>
        <input type="text" id="pingUrl" placeholder="측정할 URL 입력 (예: https://api.ipify.org)" value="https://api.ipify.org">
        <button class="btn-action" onclick="measureLatency()">응답 속도 측정 시작</button>
    </div>

    <!-- 2. 가상 쇼핑몰 트래픽 (부하 테스트) 시뮬레이터 -->
    <div class="tool-box">
        <span class="tool-title">🛍️ 2. 가상 동시 요청(RPS) 부하 시뮬레이터</span>
        <input type="number" id="reqCount" placeholder="요청 횟수 입력 (예: 10)" value="5">
        <button class="btn-action" onclick="simulateLoadTest()">동시 다중 요청 테스트 실행</button>
    </div>

    <!-- 3. JSON 구조 포맷터 및 유효성 검사 -->
    <div class="tool-box">
        <span class="tool-title">📦 3. JSON 데이터 정렬 및 파싱 검증</span>
        <textarea id="jsonInput" style="height: 70px;" placeholder='{"product": "item1", "price": 10000}'></textarea>
        <button onclick="formatJSONData()">JSON 이쁘게 정렬하기 (Pretty Print)</button>
    </div>

    <!-- 4. 쇼핑몰 상품 URL/파라미터 인코더·디코더 -->
    <div class="tool-box">
        <span class="tool-title">🔗 4. URL 쿼리 스트링 인코더 / 디코더</span>
        <input type="text" id="queryInput" placeholder="URL 또는 파라미터 입력">
        <div class="grid-2">
            <button onclick="encodeQuery()">URL 인코딩</button>
            <button onclick="decodeQuery()">URL 디코딩</button>
        </div>
    </div>

    <!-- 5. 실시간 실행 로그창 -->
    <div class="tool-box">
        <span class="tool-title">💻 인프라 점검 로그 출력</span>
        <textarea id="devLog" class="output-box" readonly>인프라 툴 준비 완료.</textarea>
        <button onclick="document.getElementById('devLog').value=''">로그 초기화</button>
    </div>
</div>

<script>
    function log(msg) {
        const box = document.getElementById('devLog');
        box.value += "\n" + msg;
        box.scrollTop = box.scrollHeight;
    }

    // 1. API 응답 속도 측정
    async function measureLatency() {
        let url = document.getElementById('pingUrl').value.trim();
        if (!url) { alert("URL을 입력하세요."); return; }
        
        log(`\n[Ping 측정]: ${url} 연결 시도 중...`);
        let startTime = performance.now();
        try {
            let res = await fetch(url, { method: 'GET', mode: 'cors' });
            let endTime = performance.now();
            let duration = Math.round(endTime - startTime);
            
            if (res.ok) {
                log(`✅ [성공] 응답 속도(Latency): ${duration}ms (Status: ${res.status})`);
            } else {
                log(`⚠️ [서버 응답 오류] Status: ${res.status} (${duration}ms)`);
            }
        } catch(e) {
            log(`❌ [측정 실패]: CORS 정책 또는 네트워크 오류 (${e.message})`);
        }
    }

    // 2. 동시 다중 요청(부하 테스트 시뮬레이션)
    async function simulateLoadTest() {
        let count = parseInt(document.getElementById('reqCount').value) || 5;
        if (count > 20) count = 20; // 브라우저 보호를 위해 최대 20개 제한
        
        log(`\n[부하 테스트 시뮬레이션]: 가상 요청 ${count개 동시 발사}...`);
        let startTime = performance.now();
        
        let promises = [];
        for (let i = 0; i < count; i++) {
            promises.push(
                fetch("https://api.ipify.org?format=json", { cache: "no-store" })
                    .then(res => res.ok)
                    .catch(() => false)
            );
        }
        
        let results = await Promise.all(promises);
        let endTime = performance.now();
        let successCount = results.filter(r => r).length;
        
        log(`📊 [결과]: 총 ${count}개 중 ${successCount}개 성공 | 소요 시간: ${Math.round(endTime - startTime)}ms`);
    }

    // 3. JSON 포맷터
    function formatJSONData() {
        try {
            let raw = document.getElementById('jsonInput').value;
            let parsed = JSON.parse(raw);
            let formatted = JSON.stringify(parsed, null, 2);
            log(`\n[JSON 정렬 성공]:\n${formatted}`);
        } catch(e) {
            log(`\n[JSON 에러]: 유효하지 않은 JSON 구조입니다 (${e.message})`);
        }
    }

    // 4. URL 인코더/디코더
    function encodeQuery() {
        let val = document.getElementById('queryInput').value;
        log(`[URL Enc]: ${encodeURIComponent(val)}`);
    }
    function decodeQuery() {
        let val = document.getElementById('queryInput').value;
        log(`[URL Dec]: ${decodeURIComponent(val)}`);
    }
</script>

</body>
</html>
