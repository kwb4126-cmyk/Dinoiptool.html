<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네트워크 및 위치 정보 수집기</title>
    <style>
        :root {
            --bg: #121212;
            --fg: #e0e0e0;
            --accent: #4caf50;
            --btn-bg: #1e1e1e;
            --btn-hover: #2c2c2c;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grid-btns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 14px 8px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #555;
        }

        button:active {
            transform: scale(0.97);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #aaa;
            padding: 0 4px;
        }

        textarea {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            width: 100%;
            height: 260px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 14px;
            box-sizing: border-box;
            border-radius: 16px;
            outline: none;
            line-height: 1.4;
        }

        .extra-btns {
            display: flex;
            gap: 8px;
        }

        .extra-btns button {
            flex: 1;
            border-radius: 20px;
            background-color: #1a231a;
            border-color: #2e522e;
            color: #81c784;
        }

        .extra-btns button:hover {
            background-color: #233523;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>정보 수집 도구</h2>

    <div class="grid-btns">
        <button onclick="getVisitorIP()">IP 주소 수집</button>
        <button onclick="getGPSLocation()">위치(GPS) 허용 요청</button>
    </div>

    <div class="status-bar">
        <span id="counterLabel">상태: 대기 중</span>
        <span id="targetIpLabel" style="color: #666;">IP: 확인 안 됨</span>
    </div>

    <textarea id="logText" readonly>페이지 접속 완료. 기능을 선택하세요.</textarea>

    <div class="extra-btns">
        <button onclick="openMap()">📍 구글 지도 열기</button>
        <button onclick="copyResult()">📋 결과 복사</button>
    </div>
</div>

<script>
    let lastLat = null;
    let lastLon = null;
    let capturedIp = null;

    const txt = document.getElementById('logText');
    const c = document.getElementById('counterLabel');
    const targetLabel = document.getElementById('targetIpLabel');

    function log(text) {
        txt.value += text;
        txt.scrollTop = txt.scrollHeight;
    }

    // 접속자/타인의 IP 주소 수집 함수
    async function getVisitorIP() {
        try {
            log("\n> IP 주소 수집 중...\n");
            let res = await fetch("https://api.ipify.org?format=json");
            let d = await res.json();
            capturedIp = d.ip;
            
            targetLabel.innerText = `IP: ${capturedIp}`;
            let timeStr = new Date().toLocaleTimeString();
            
            let resultStr = `[${timeStr}] 접속자 IP 수집 성공\n- IP 주소: ${capturedIp}\n\n`;
            log(resultStr);
            c.innerText = "상태: IP 수집 완료";
        } catch (ex) {
            alert("IP를 가져오지 못했습니다.");
            log(`> IP 수집 실패: ${ex}\n`);
        }
    }

    // GPS 권한 허용 시 위치 정보 수집 함수
    function getGPSLocation() {
        if (!navigator.geolocation) {
            alert("이 브라우저는 위치 정보를 지원하지 않습니다.");
            return;
        }

        log("\n> 위치(GPS) 권한 요청 중...\n");

        navigator.geolocation.getCurrentPosition(
            (position) => {
                lastLat = position.coords.latitude;
                lastLon = position.coords.longitude;
                let accuracy = position.coords.accuracy;
                let timeStr = new Date().toLocaleTimeString();

                let resultStr = `[${timeStr}] GPS 위치 수집 성공 (허용됨)\n- 위도: ${lastLat}\n- 경도: ${lastLon}\n- 오차 범위: 약 ${Math.round(accuracy)}m\n\n`;
                
                c.innerText = "상태: GPS 수집 완료";
                log(resultStr);
            },
            (error) => {
                alert("위치 권한이 거부되었거나 가져오지 못했습니다.");
                log(`> GPS 수집 실패 또는 거부됨: ${error.message}\n`);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    function openMap() {
        if (!lastLat || !lastLon) {
            alert("수집된 위치(GPS) 좌표가 없습니다.");
            return;
        }
        window.open(`https://maps.google.com/?q=${lastLat},${lastLon}`, '_blank');
    }

    function copyResult() {
        if (!txt.value) {
            alert("복사할 내용이 없습니다.");
            return;
        }
        navigator.clipboard.writeText(txt.value).then(() => {
            alert("수집된 결과가 복사되었습니다!");
        });
    }
</script>

</body>
</html>
