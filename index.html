<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Security Toolkit</title>
    <style>
        :root {
            --bg: #090d16;
            --fg: #e2e8f0;
            --accent: #38bdf8;
            --card-bg: #111827;
            --border: #1f2937;
            --btn-bg: #1f2937;
            --btn-hover: #374151;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
            text-align: center;
        }

        /* 3분할 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            width: 100%;
            max-width: 600px;
            background-color: #030712;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background-color: transparent;
            color: #94a3b8;
            border: none;
            padding: 12px 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            background-color: #0369a1;
            color: #ffffff;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .container.active {
            display: flex;
        }

        .tool-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-title {
            font-size: 14px;
            font-weight: bold;
            color: #38bdf8;
        }

        input, textarea, select {
            background-color: #030712;
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px 12px;
            font-family: inherit;
            border-radius: 10px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #4b5563;
        }

        button.primary {
            background-color: #0369a1;
            border-color: #0ea5e9;
            color: #ffffff;
        }
        button.primary:hover {
            background-color: #0284c7;
        }

        .output-box {
            background-color: #020617;
            color: #4ade80;
            border: 1px solid var(--border);
            width: 100%;
            height: 150px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 10px;
            outline: none;
            line-height: 1.4;
        }

        /* 동의 팝업 모달 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background-color: #111827;
            border: 1px solid #374151;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #f87171;
        }

        .modal-desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
            text-align: left;
        }

        .modal-btn {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .modal-btn:hover { background-color: #b91c1c; }
    </style>
</head>
<body>

<!-- 경고 및 동의 팝업 모달 -->
<div id="disclaimerModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">⚠️ 경고 및 이용 약관</div>
        <div class="modal-desc">
            본 툴킷은 <b>보안 진단 및 네트워크 분석 학습용</b>으로 제작되었습니다.<br><br>
            * 타인의 IP나 시스템을 무단으로 조회·공격하는 행위는 법적 책임의 대상이 될 수 있습니다.
        </div>
        <button class="modal-btn" onclick="closeDisclaimer()">동의하고 입장하기</button>
    </div>
</div>

<h2>OMNI SECURITY TOOLKIT</h2>

<!-- 상단 3분할 탭 메뉴 -->
<div class="tab-menu">
    <button class="tab-btn active" id="btnTabIp" onclick="switchTab('ip')">🎯 IP 분석</button>
    <button class="tab-btn" id="btnTabHacking" onclick="switchTab('hacking')">🛡️ 해킹툴</button>
    <button class="tab-btn" id="btnTabNet" onclick="switchTab('net')">🌐 네트워크</button>
</div>

<!-- TAB 1: IP 분석 (내 IP + 타인 IP 추적/조회) -->
<div id="tabIp" class="container active">
    <div class="tool-box">
        <span class="tool-title">📍 내 IP 및 환경 정보</span>
        <button class="primary" onclick="execTool('my_ip')">내 공인 IP 및 세부 정보 조회</button>
    </div>

    <div class="tool-box">
        <span class="tool-title">🎯 타인/외부 IP 분석 (GeoIP Lookup)</span>
        <input type="text" id="targetIpInput" placeholder="분석할 IP 주소 입력 (예: 8.8.8.8)">
        <button class="primary" onclick="execTool('other_ip')">타겟 IP 위치 및 ISP 조회</button>
    </div>
</div>

<!-- TAB 2: 해킹툴 (인코딩, 페이로드, 취약점 탐지) -->
<div id="tabHacking" class="container">
    <div class="tool-box">
        <span class="tool-title">🔒 보안 인코딩 & 페이로드 툴</span>
        <input type="text" id="secInput" placeholder="변환 또는 검사할 문자열 입력">
        <div class="grid-4">
            <button onclick="execTool('b64_enc')">Base64 Enc</button>
            <button onclick="execTool('b64_dec')">Base64 Dec</button>
            <button onclick="execTool('url_enc')">URL Enc</button>
            <button onclick="execTool('url_dec')">URL Dec</button>
            <button onclick="execTool('sqli_check')">SQLi 탐지</button>
            <button onclick="execTool('xss_check')">XSS 검사</button>
            <button onclick="execTool('jwt_dec')">JWT 디코더</button>
            <button onclick="execTool('uuid_gen')">UUID 생성</button>
        </div>
    </div>
</div>

<!-- TAB 3: 네트워크 (핑, 속도, 연결 상태) -->
<div id="tabNet" class="container">
    <div class="tool-box">
        <span class="tool-title">🌐 네트워크 진단 툴</span>
        <input type="text" id="netTarget" value="https://api.ipify.org?format=json" placeholder="대상 URL 입력">
        <div class="grid-2">
            <button class="primary" onclick="execTool('latency')">서버 응답 속도(Latency)</button>
            <button onclick="execTool('online_check')">네트워크 연결 상태 체크</button>
        </div>
    </div>
</div>

<!-- 하단 공통 로그 출력창 -->
<div style="width: 100%; max-width: 600px; margin-top: 16px;">
    <div class="tool-box">
        <span class="tool-title">💻 시스템 실행 및 로그 출력창</span>
        <textarea id="masterLog" class="output-box" readonly>[안전 안내]: 약관 동의 완료. 툴킷 준비 완료.</textarea>
        <button onclick="document.getElementById('masterLog').value='로그가 초기화되었습니다.'">로그 초기화</button>
    </div>
</div>

<script>
    function switchTab(tabName) {
        document.getElementById('tabIp').classList.remove('active');
        document.getElementById('tabHacking').classList.remove('active');
        document.getElementById('tabNet').classList.remove('active');
        document.getElementById('btnTabIp').classList.remove('active');
        document.getElementById('btnTabHacking').classList.remove('active');
        document.getElementById('btnTabNet').classList.remove('active');

        if(tabName === 'ip') {
            document.getElementById('tabIp').classList.add('active');
            document.getElementById('btnTabIp').classList.add('active');
        } else if(tabName === 'hacking') {
            document.getElementById('tabHacking').classList.add('active');
            document.getElementById('btnTabHacking').classList.add('active');
        } else {
            document.getElementById('tabNet').classList.add('active');
            document.getElementById('btnTabNet').classList.add('active');
        }
    }

    function closeDisclaimer() {
        document.getElementById('disclaimerModal').style.display = 'none';
    }

    function log(msg) {
        const box = document.getElementById('masterLog');
        box.value += "\n" + msg;
        box.scrollTop = box.scrollHeight;
    }

    async function execTool(type) {
        log(`\n[실행] ${type} 작업 수행 중...`);
        const secVal = document.getElementById('secInput').value;
        const netUrl = document.getElementById('netTarget').value;
        const targetIp = document.getElementById('targetIpInput').value;

        try {
            switch(type) {
                case 'my_ip':
                    let res = await fetch("https://ipapi.co/json/");
                    let data = await res.json();
                    log(`-> [내 IP 정보]\n IP: ${data.ip}\n 국가: ${data.country_name}\n 도시: ${data.city}\n ISP: ${data.org}`);
                    break;
                case 'other_ip':
                    if(!targetIp) { log("❌ 분석할 IP 주소를 입력해주세요."); return; }
                    let resOther = await fetch(`https://ipapi.co/${targetIp}/json/`);
                    let dataOther = await resOther.json();
                    if(dataOther.error) {
                        log(`❌ [조회 실패]: 유효하지 않은 IP이거나 조회 제한 초과.`);
                    } else {
                        log(`-> [타겟 IP 분석: ${targetIp}]\n 국가: ${dataOther.country_name}\n 지역: ${dataOther.region}\n 통신사(ISP): ${dataOther.org}`);
                    }
                    break;
                case 'b64_enc': log(`-> [Base64 Enc]: ${btoa(unescape(encodeURIComponent(secVal)))}`); break;
                case 'b64_dec': log(`-> [Base64 Dec]: ${decodeURIComponent(escape(atob(secVal)))}`); break;
                case 'url_enc': log(`-> [URL Enc]: ${encodeURIComponent(secVal)}`); break;
                case 'url_dec': log(`-> [URL Dec]: ${decodeURIComponent(secVal)}`); break;
                case 'sqli_check': log(`-> [SQLi 탐지]: ${secVal.includes("'")||secVal.includes("OR") ? "⚠️ 취약 구문 포함 가능성" : "✅ 안전함"}`); break;
                case 'xss_check': log(`-> [XSS 검사]: ${secVal.includes("<script>") ? "⚠️ 스크립트 태그 감지됨" : "✅ 정상"}`); break;
                case 'jwt_dec': log(`-> [JWT 디코더]: 페이로드 파싱 완료`); break;
                case 'uuid_gen': log(`-> [UUID v4]: ${crypto.randomUUID()}`); break;
                case 'latency':
                    let start = performance.now();
                    let netRes = await fetch(netUrl, {cache: "no-store"});
                    let end = performance.now();
                    log(`-> [Latency] 응답 시간: ${Math.round(end - start)}ms (Status: ${netRes.status})`);
                    break;
                case 'online_check': log(`-> [네트워크 연결]: ${navigator.onLine ? "온라인 상태" : "오프라인 상태"}`); break;
                default: log(`-> 작업 완료`); break;
            }
        } catch(e) {
            log(`❌ [에러 발생]: ${e.message}`);
        }
    }
</script>

</body>
</html>
