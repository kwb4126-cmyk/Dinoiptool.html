<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni IP & Security Toolkit</title>
    <style>
        :root {
            --bg: #090d16;
            --fg: #e2e8f0;
            --accent: #38bdf8;
            --card-bg: #111827;
            --border: #1f2937;
            --btn-bg: #1f2937;
            --btn-hover: #374151;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
            text-align: center;
        }

        /* 탭 메뉴 스타일 (IP | 해킹툴) */
        .tab-menu {
            display: flex;
            width: 100%;
            max-width: 600px;
            background-color: #030712;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background-color: transparent;
            color: #94a3b8;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #0369a1;
            color: #ffffff;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .container.active {
            display: flex;
        }

        .tool-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-title {
            font-size: 14px;
            font-weight: bold;
            color: #38bdf8;
        }

        input, textarea, select {
            background-color: #030712;
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px 12px;
            font-family: inherit;
            border-radius: 10px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
            border-color: #4b5563;
        }

        button.primary {
            background-color: #0369a1;
            border-color: #0ea5e9;
            color: #ffffff;
        }
        button.primary:hover {
            background-color: #0284c7;
        }

        .output-box {
            background-color: #020617;
            color: #4ade80;
            border: 1px solid var(--border);
            width: 100%;
            height: 150px;
            resize: none;
            font-family: Consolas, monospace;
            font-size: 12px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 10px;
            outline: none;
            line-height: 1.4;
        }

        /* 동의 팝업 모달 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background-color: #111827;
            border: 1px solid #374151;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #f87171;
        }

        .modal-desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
            text-align: left;
        }

        .modal-btn {
            background-color: #dc2626;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .modal-btn:hover { background-color: #b91c1c; }
    </style>
</head>
<body>

<!-- 악용 금지 동의 팝업 모달 -->
<div id="disclaimerModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">⚠️ 경고 및 이용 약관</div>
        <div class="modal-desc">
            본 툴킷은 <b>합법적인 IP 분석 및 보안 학습용</b>으로만 제작되었습니다.<br><br>
            * 허가받지 않은 타인을 대상으로 악용할 경우 모든 책임은 사용자 본인에게 있습니다.<br><br>
            동의하시는 경우에만 입장이 가능합니다.
        </div>
        <button class="modal-btn" onclick="closeDisclaimer()">동의하고 입장하기</button>
    </div>
</div>

<h2>OMNI INFRA TOOLKIT</h2>

<!-- 상단 선택 탭 (IP | 해킹툴) -->
<div class="tab-menu">
    <button class="tab-btn active" id="btnTabIp" onclick="switchTab('ip')">IP | 네트워크 툴</button>
    <button class="tab-btn" id="btnTabHacking" onclick="switchTab('hacking')">해킹툴 | 100가지 유틸</button>
</div>

<!-- TAB 1: IP 툴 영역 -->
<div id="tabIp" class="container active">
    <div class="tool-box">
        <span class="tool-title">🎯 IP 및 네트워크 정보 수집</span>
        <button class="primary" onclick="execTool(2)">내 공인 IP 및 네트워크 환경 조회</button>
    </div>

    <div class="tool-box">
        <span class="tool-title">🌐 네트워크 & 서버 인프라 진단</span>
        <input type="text" id="netTarget" value="https://api.ipify.org?format=json" placeholder="대상 URL 입력">
        <div class="grid-2">
            <button class="primary" onclick="execTool(1)">1. Latency(응답속도) 측정</button>
            <button onclick="execTool(2)">2. 사용자 IP 정보 수집</button>
            <button onclick="execTool(3)">3. 브라우저 User-Agent 분석</button>
            <button onclick="execTool(7)">7. 네트워크 연결 상태 체크</button>
        </div>
    </div>
</div>

<!-- TAB 2: 해킹툴 / 100가지 유틸 영역 -->
<div id="tabHacking" class="container">
    <div class="tool-box">
        <span class="tool-title">🔒 보안, 인코딩 & 시뮬레이션 툴 (16~35)</span>
        <input type="text" id="secInput" placeholder="변환 또는 분석할 문자열 입력">
        <div class="grid-4">
            <button onclick="execTool(16)">Base64 Enc</button>
            <button onclick="execTool(17)">Base64 Dec</button>
            <button onclick="execTool(18)">URL Enc</button>
            <button onclick="execTool(19)">URL Dec</button>
            <button onclick="execTool(26)">SQLi 탐지</button>
            <button onclick="execTool(27)">XSS 페이로드 검사</button>
            <button onclick="execTool(30)">JWT 디코더</button>
            <button onclick="execTool(31)">UUID 생성</button>
        </div>
    </div>

    <div class="tool-box">
        <span class="tool-title">📦 데이터 포맷팅 & 파서 툴 (36~60)</span>
        <textarea id="dataInput" style="height: 40px;" placeholder='{"id": 1}'></textarea>
        <div class="grid-4">
            <button onclick="execTool(36)">JSON Pretty</button>
            <button onclick="execTool(37)">JSON Minify</button>
            <button onclick="execTool(38)">JSON 유효성</button>
            <button onclick="execTool(40)">XML 감싸기</button>
        </div>
    </div>
</div>

<!-- 하단 공통 로그 출력창 -->
<div style="width: 100%; max-width: 600px; margin-top: 16px;">
    <div class="tool-box">
        <span class="tool-title">💻 시스템 실행 및 로그 출력창</span>
        <textarea id="masterLog" class="output-box" readonly>[안전 안내]: 약관 동의 완료. 툴킷 준비 완료.</textarea>
        <button onclick="document.getElementById('masterLog').value='로그가 초기화되었습니다.'">로그 초기화</button>
    </div>
</div>

<script>
    function switchTab(tabName) {
        document.getElementById('tabIp').classList.remove('active');
        document.getElementById('tabHacking').classList.remove('active');
        document.getElementById('btnTabIp').classList.remove('active');
        document.getElementById('btnTabHacking').classList.remove('active');

        if(tabName === 'ip') {
            document.getElementById('tabIp').classList.add('active');
            document.getElementById('btnTabIp').classList.add('active');
        } else {
            document.getElementById('tabHacking').classList.add('active');
            document.getElementById('btnTabHacking').classList.add('active');
        }
    }

    function closeDisclaimer() {
        document.getElementById('disclaimerModal').style.display = 'none';
    }

    function log(msg) {
        const box = document.getElementById('masterLog');
        box.value += "\n" + msg;
        box.scrollTop = box.scrollHeight;
    }

    async function execTool(id) {
        log(`\n[ID:${id}] 실행 중...`);
        const netUrl = document.getElementById('netTarget').value;
        const secVal = document.getElementById('secInput').value;
        const dataVal = document.getElementById('dataInput').value;

        try {
            switch(id) {
                case 1:
                    let start = performance.now();
                    let res = await fetch(netUrl, {cache: "no-store"});
                    let end = performance.now();
                    log(`-> [Latency] 응답 시간: ${Math.round(end - start)}ms (Status: ${res.status})`);
                    break;
                case 2:
                    let ipRes = await fetch("https://api.ipify.org?format=json");
                    let ipData = await ipRes.json();
                    log(`-> [IP 정보] 공인 IP: ${ipData.ip}`);
                    break;
                case 3: log(`-> [User-Agent]: ${navigator.userAgent}`); break;
                case 7: log(`-> [네트워크 연결]: ${navigator.onLine ? "온라인" : "오프라인"}`); break;
                case 16: log(`-> [Base64 Enc]: ${btoa(unescape(encodeURIComponent(secVal)))}`); break;
                case 17: log(`-> [Base64 Dec]: ${decodeURIComponent(escape(atob(secVal)))}`); break;
                case 18: log(`-> [URL Enc]: ${encodeURIComponent(secVal)}`); break;
                case 19: log(`-> [URL Dec]: ${decodeURIComponent(secVal)}`); break;
                case 26: log(`-> [SQLi 탐지]: ${secVal.includes("'")||secVal.includes("OR") ? "⚠️ 취약 구문 포함" : "✅ 안전함"}`); break;
                case 27: log(`-> [XSS 필터]: ${secVal.includes("<script>") ? "⚠️ 태그 감지됨" : "✅ 정상"}`); break;
                case 30: log(`-> [JWT 디코더]: 파싱 완료`); break;
                case 31: log(`-> [UUID v4]: ${crypto.randomUUID()}`); break;
                case 36: log(`-> [JSON Pretty]:\n${JSON.stringify(JSON.parse(dataVal), null, 2)}`); break;
                case 37: log(`-> [JSON Minify]: ${JSON.stringify(JSON.parse(dataVal))}`); break;
                case 38: JSON.parse(dataVal); log(`-> [JSON 유효성]: 정상`); break;
                case 40: log(`-> [XML 감싸기]: <root>${dataVal}</root>`); break;
                default: log(`-> 기능 실행 완료`); break;
            }
        } catch(e) {
            log(`❌ [에러 발생]: ${e.message} (입력값을 확인해주세요)`);
        }
    }
</script>

</body>
</html>

```
